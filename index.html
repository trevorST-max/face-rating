<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FACIAL ANALYSIS v1.2</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    
    <style>
        :root {
            --bg-color: #060608;
            --panel-color: #0b0b0f;
            --border-color: #1a1a24;
            --accent-color: #00f0ff;
            --accent-glow: rgba(0, 240, 255, 0.35);
            --text-color: #f1f5f9;
            --text-muted: #64748b;
            --success: #10b981;
            --error: #f43f5e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--panel-color);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7);
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            color: var(--accent-color);
            text-shadow: 0 0 12px var(--accent-glow);
            margin-bottom: 4px;
            letter-spacing: 3px;
        }

        .subtitle {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Индикатор загрузки с пульсацией */
        #loading-screen {
            padding: 50px 10px;
        }

        .spinner-dots {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 25px;
        }

        .dot {
            width: 12px;
            height: 12px;
            background-color: var(--accent-color);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-color);
            animation: pulse-dot 1.5s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes pulse-dot {
            0%, 80%, 100% { opacity: 0.15; transform: scale(0.75); }
            40% { opacity: 1; transform: scale(1.3); }
        }

        #main-ui {
            display: none;
        }

        .preview-box {
            position: relative;
            width: 100%;
            aspect-ratio: 3/4;
            background: #020203;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #1e1e2f;
            margin-bottom: 24px;
        }

        #canvas-output {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .btn-action {
            background: transparent;
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 14px 24px;
            font-size: 0.85rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: all 0.25s ease;
            letter-spacing: 1px;
        }

        .btn-action:active {
            background: var(--accent-color);
            color: #000;
            box-shadow: 0 0 20px var(--accent-color);
        }

        #file-input {
            display: none;
        }

        #status-msg {
            font-size: 0.75rem;
            margin-top: 12px;
            color: var(--text-muted);
            line-height: 1.4;
        }

        /* Dashboard Системы Оценок */
        #dashboard {
            display: none;
            margin-top: 30px;
            border-top: 1px solid var(--border-color);
            padding-top: 24px;
            text-align: left;
        }

        .score-wrap {
            text-align: center;
            margin-bottom: 25px;
        }

        .rating-num {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--accent-color);
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
        }

        .rating-tier-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 4px;
        }

        .metric-card {
            background: #0e0e14;
            border: 1px solid #15151f;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 12px;
            border-left: 4px solid var(--text-muted);
        }

        .metric-card.status-good { border-left-color: var(--success); }
        .metric-card.status-warn { border-left-color: #f59e0b; }
        .metric-card.status-bad { border-left-color: var(--error); }

        .metric-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 6px;
        }

        .metric-info {
            font-size: 0.75rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .roadmap-container {
            margin-top: 25px;
            background: rgba(0, 240, 255, 0.02);
            border: 1px solid rgba(0, 240, 255, 0.08);
            padding: 16px;
            border-radius: 8px;
        }

        .roadmap-header {
            font-size: 0.85rem;
            color: var(--accent-color);
            margin-bottom: 12px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .roadmap-details {
            font-size: 0.75rem;
            color: var(--text-color);
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>FACIAL ANALYSIS v1.2</h1>
    <div class="subtitle">Client-Side Engine / Mobile Edition</div>

    <div id="loading-screen">
        <div id="loading-text" style="font-size: 0.8rem; line-height: 1.4;">Инициализация ядра ИИ...</div>
        <div class="spinner-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <div id="main-ui">
        <div class="preview-box">
            <canvas id="canvas-output"></canvas>
            <div id="placeholder" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:var(--text-muted); font-size:0.75rem; pointer-events:none; width:80%;">Ожидание структуры лица (ФАС)</div>
        </div>

        <label for="file-input" class="btn-action">ЗАГРУЗИТЬ СНИМОК</label>
        <input type="file" id="file-input" accept="image/*">
        
        <div id="status-msg">Для идеального расчета смотрите прямо, лицо без наклонов, свет фронтальный.</div>

        <div id="dashboard">
            <div class="score-wrap">
                <div class="rating-num" id="psl-score-output">0.0</div>
                <div class="rating-tier-label" id="psl-tier-output">Анализ</div>
            </div>

            <div id="metrics-container"></div>

            <div class="roadmap-container">
                <div class="roadmap-header">РЕКОМЕНДАЦИИ ПО СТРУКТУРЕ ЛИЦА:</div>
                <div class="roadmap-details" id="roadmap-output">Загрузите портретный снимок.</div>
            </div>
        </div>
    </div>
</div>

<script>
    const loadingScreen = document.getElementById('loading-screen');
    const loadingText = document.getElementById('loading-text');
    const mainUi = document.getElementById('main-ui');
    const fileInput = document.getElementById('file-input');
    const canvas = document.getElementById('canvas-output');
    const ctx = canvas.getContext('2d');
    const statusMsg = document.getElementById('status-msg');
    const placeholder = document.getElementById('placeholder');

    // Безопасная мобильная загрузка архитектуры нейросети
    async function startEngine() {
        try {
            // Зеркало бесплатных весов моделей на открытом CDN
            const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models/';
            
            loadingText.innerText = "Загрузка архитектуры контуров...";
            await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
            
            loadingText.innerText = "Калибровка 68-точечной матрицы...";
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);

            loadingScreen.style.display = 'none';
            mainUi.style.display = 'block';
        } catch (err) {
            console.error(err);
            loadingText.innerHTML = `<span style="color:var(--error)">Сбой загрузки ядра. Проверьте сеть или смените браузер.</span>`;
        }
    }

    window.addEventListener('load', startEngine);

    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const img = await faceapi.bufferToImage(file);
        
        // Масштабируем холст под загруженное мобильное фото
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        ctx.drawImage(img, 0, 0);
        placeholder.style.display = 'none';
        
        statusMsg.innerText = "Вычисление тригонометрических векторов...";
        
        setTimeout(async () => {
            await runAnalysis(img);
        }, 150);
    });

    async function runAnalysis(imgElement) {
        // Поиск лица и его анатомических точек
        const detection = await faceapi.detectSingleFace(imgElement).withFaceLandmarks();
        
        if (!detection) {
            statusMsg.innerHTML = `<span style="color:var(--error)">Лицо не найдено. Убедитесь, что лицо полностью в кадре и нет жестких теней.</span>`;
            return;
        }

        statusMsg.innerText = "Сканирование завершено. Метрики рассчитаны.";
        const landmarks = detection.landmarks.getPositions();

        // Расчет базовых ориентиров по 68-точечной схеме
        const leftInnerEye = landmarks[39];
        const leftOuterEye = landmarks[36];
        const rightInnerEye = landmarks[42];
        const rightOuterEye = landmarks[45];

        const leftEyebrowInner = landmarks[21];
        const leftPupilY = (landmarks[37].y + landmarks[41].y) / 2;

        const nasionTop = landmarks[27]; 
        const chinBottom = landmarks[8];  
        const leftJawBone = landmarks[2];  
        const rightJawBone = landmarks[14]; 
        const noseBase = landmarks[33];   

        // 1. Расчет Canthal Tilt (Левый глаз)
        const dX_L = leftOuterEye.x - leftInnerEye.x;
        const dY_L = leftOuterEye.y - leftInnerEye.y;
        const canthalLeft = parseFloat((-Math.atan2(dY_L, dX_L) * (180 / Math.PI)).toFixed(1));

        // 2. Расчет Canthal Tilt (Правый глаз)
        const dX_R = rightOuterEye.x - rightInnerEye.x;
        const dY_R = rightOuterEye.y - rightInnerEye.y;
        const canthalRight = parseFloat((Math.atan2(dY_R, dX_R) * (180 / Math.PI)).toFixed(1));
        
        const avgCanthal = parseFloat(((canthalLeft + canthalRight) / 2).toFixed(1));

        // 3. Расчет Facial Index (Высота лица к ширине скул/челюсти)
        const faceHeight = Math.hypot(chinBottom.x - nasionTop.x, chinBottom.y - nasionTop.y);
        const faceWidth = Math.hypot(rightJawBone.x - leftJawBone.x, rightJawBone.y - leftJawBone.y);
        const facialIndex = parseFloat((faceHeight / faceWidth).toFixed(2));

        // 4. Расчет Lower Third Ratio (Доля нижней трети)
        const lowerThirdHeight = Math.hypot(chinBottom.x - noseBase.x, chinBottom.y - noseBase.y);
        const lowerThirdRatio = parseFloat((lowerThirdHeight / faceHeight).toFixed(2));

        // 5. Расчет Eye-to-Brow Distance (Расстояние от брови до зрачка в пикселях)
        const eyeBrowDist = parseFloat(Math.abs(leftPupilY - leftEyebrowInner.y).toFixed(1));

        // Визуализация линий геометрии на холсте
        ctx.lineWidth = Math.max(3, canvas.width / 150);
        
        // Линии глаз
        ctx.strokeStyle = avgCanthal >= 0 ? '#10b981' : '#f43f5e';
        ctx.beginPath();
        ctx.moveTo(leftInnerEye.x, leftInnerEye.y); ctx.lineTo(leftOuterEye.x, leftOuterEye.y);
        ctx.moveTo(rightInnerEye.x, rightInnerEye.y); ctx.lineTo(rightOuterEye.x, rightOuterEye.y);
        ctx.stroke();

        // Вертикальная ось
        ctx.strokeStyle = '#00f0ff';
        ctx.lineWidth = Math.max(2, canvas.width / 220);
        ctx.beginPath();
        ctx.moveTo(nasionTop.x, nasionTop.y);
        ctx.lineTo(chinBottom.x, chinBottom.y);
        ctx.stroke();

        renderDashboard(avgCanthal, facialIndex, lowerThirdRatio, eyeBrowDist, canvas.width);
    }

    function renderDashboard(canthal, fIndex, lowerThird, ebDist, cWidth) {
        document.getElementById('dashboard').style.display = 'block';
        
        let psl = 5.0; // Средняя точка по канонам TrueRateMe
        let cardsHtml = '';
        let advice = [];

        // Карта 1: Canthal Tilt
        let cClass = 'status-bad';
        if (canthal > 1.5) { cClass = 'status-good'; psl += 0.8; }
        else if (canthal >= 0) { cClass = 'status-warn'; psl += 0.2; }
        else { psl -= 0.8; advice.push("Зафиксирован отрицательный наклон глаз (усталый взгляд). Минимизировать его помогают патчи, регулярный сон и легкий массаж зоны вокруг глаз для улучшения циркуляции."); }
        
        cardsHtml += `
            <div class="metric-card ${cClass}">
                <div class="metric-meta"><span>Canthal Tilt (Наклон глаз)</span><span>${canthal}°</span></div>
                <div class="metric-info">Положительный угол (>0°) формирует "модельный" взгляд. Отрицательный придает лицу усталость.</div>
            </div>`;

        // Карта 2: Facial Index
        let fClass = 'status-warn';
        if (fIndex >= 0.83 && fIndex <= 0.89) { fClass = 'status-good'; psl += 0.5; }
        cardsHtml += `
            <div class="metric-card ${fClass}">
                <div class="metric-meta"><span>Facial Index (Пропорции)</span><span>${fIndex}</span></div>
                <div class="metric-info">Отношение вертикали лица к его горизонтальной ширине. Норма гармонии: 0.83 - 0.89.</div>
            </div>`;

        // Карта 3: Нижняя треть
        let ltClass = 'status-bad';
        if (lowerThird >= 0.30 && lowerThird <= 0.35) { ltClass = 'status-good'; psl += 0.4; }
        else { 
            psl -= 0.4; 
            advice.push("Нижняя треть имеет легкое отклонение от симметрии третей. Для улучшения контуров нижней челюсти и укрепления жевательной зоны практикуйте контроль осанки шеи и правильное положение языка (Мьюинг). Важно спать равномерно, избегая сильного сдавливания одной стороны."); 
        }
        cardsHtml += `
            <div class="metric-card ${ltClass}">
                <div class="metric-meta"><span>Lower Third Ratio (Нижняя треть)</span><span>${lowerThird}</span></div>
                <div class="metric-info">Доля подбородка и челюсти в общей структуре лица. Золотой стандарт: ~0.33.</div>
            </div>`;

        // Расчет итогового рейтинга
        psl = Math.max(1.0, Math.min(10.0, psl)).toFixed(1);
        document.getElementById('psl-score-output').innerText = psl;
        
        let tier = "Mid Tier MTN";
        if (psl >= 6.0) tier = "Chadlite";
        if (psl >= 7.5) tier = "Chad";
        if (psl < 4.0) tier = "Low Tier MTN";
        document.getElementById('psl-tier-output').innerText = tier;

        document.getElementById('metrics-container').innerHTML = cardsHtml;
        
        if (advice.length === 0) {
            advice.push("Глобальных диспропорций в костной структуре не выявлено. Поддерживайте тонус кожи, следите за осанкой и общим процентом жира.");
        }
        document.getElementById('roadmap-output').innerText = advice.join(' ');
    }
</script>
</body>
</html>
