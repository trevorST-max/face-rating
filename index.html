<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FACIAL ANALYSIS v1.1</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm/vision_bundle.js" crossorigin="anonymous"></script>
    
    <style>
        :root {
            --bg-color: #0a0a0c;
            --panel-color: #121216;
            --accent-color: #00f0ff;
            --accent-glow: rgba(0, 240, 255, 0.4);
            --text-color: #e2e8f0;
            --text-muted: #64748b;
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--panel-color);
            border: 1px solid #22252e;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-size: 1.4rem;
            color: var(--accent-color);
            text-shadow: 0 0 10px var(--accent-glow);
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        /* Экран загрузки и пульсирующие точки */
        #loading-screen {
            padding: 40px 20px;
        }

        .spinner-dots {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 20px;
        }

        .dot {
            width: 10px;
            height: 10px;
            background-color: var(--accent-color);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-color);
            animation: pulse 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes pulse {
            0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
            40% { opacity: 1; transform: scale(1.2); }
        }

        #main-ui {
            display: none;
        }

        .preview-container {
            position: relative;
            width: 100%;
            aspect-ratio: 3/4;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 1px dashed #334155;
            margin-bottom: 20px;
        }

        #canvas-output {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .btn {
            background: transparent;
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 12px 20px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 0 5px rgba(0, 240, 255, 0.1);
        }

        .btn:active {
            background: var(--accent-color);
            color: #000;
            box-shadow: 0 0 15px var(--accent-color);
        }

        #file-input {
            display: none;
        }

        #status-msg {
            font-size: 0.8rem;
            margin-top: 10px;
            color: var(--text-muted);
        }

        /* Панель результатов */
        #dashboard {
            display: none;
            margin-top: 25px;
            border-top: 1px solid #22252e;
            padding-top: 20px;
            text-align: left;
        }

        .score-box {
            text-align: center;
            margin-bottom: 20px;
        }

        .rating-val {
            font-size: 3rem;
            font-weight: bold;
            color: var(--accent-color);
        }

        .rating-tier {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .metric-item {
            background: #181820;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            border-left: 3px solid var(--text-muted);
        }

        .metric-item.good { border-left-color: var(--success); }
        .metric-item.bad { border-left-color: var(--error); }

        .metric-head {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .metric-desc {
            font-size: 0.75rem;
            color: var(--text-muted);
            line-height: 1.3;
        }

        .roadmap-box {
            margin-top: 20px;
            background: rgba(0, 240, 255, 0.03);
            border: 1px solid rgba(0, 240, 255, 0.1);
            padding: 15px;
            border-radius: 6px;
        }

        .roadmap-title {
            font-size: 0.9rem;
            color: var(--accent-color);
            margin-bottom: 10px;
            font-weight: bold;
        }

        .roadmap-text {
            font-size: 0.75rem;
            color: var(--text-color);
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>FACIAL ANALYSIS v1.1</h1>
    <div class="subtitle">Mobile Client-Side Looksmaxing Engine</div>

    <div id="loading-screen">
        <div id="loading-text" style="font-size: 0.85rem;">Инициализация ИИ модулей...</div>
        <div class="spinner-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <div id="main-ui">
        <div class="preview-container">
            <canvas id="canvas-output"></canvas>
            <div id="placeholder-text" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:var(--text-muted); font-size:0.8rem; pointer-events:none;">Фото не загружено</div>
        </div>

        <label for="file-input" class="btn">ЗАГРУЗИТЬ СНИМОК ФАС</label>
        <input type="file" id="file-input" accept="image/*">
        
        <div id="status-msg">Система готова. Используйте селфи при прямом свете.</div>

        <div id="dashboard">
            <div class="score-box">
                <div class="rating-val" id="res-psl">0.0</div>
                <div class="rating-tier" id="res-tier">Оценка</div>
            </div>

            <div id="metrics-list">
                </div>

            <div class="roadmap-box">
                <div class="roadmap-title">LOOKSMAXING ROADMAP:</div>
                <div class="roadmap-text" id="res-roadmap">Загрузите снимок для анализа.</div>
            </div>
        </div>
    </div>
</div>

<script>
    let faceLandmarker;
    const loadingScreen = document.getElementById('loading-screen');
    const loadingText = document.getElementById('loading-text');
    const mainUi = document.getElementById('main-ui');
    const fileInput = document.getElementById('file-input');
    const canvas = document.getElementById('canvas-output');
    const ctx = canvas.getContext('2d');
    const statusMsg = document.getElementById('status-msg');
    const placeholderText = document.getElementById('placeholder-text');

    // Безопасная инициализация ИИ MediaPipe
    async function initMediaPipe() {
        try {
            loadingText.innerText = "Скачивание файлов конфигурации...";
            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm"
            );
            
            loadingText.innerText = "Сборка детектора лица...";
            faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`,
                    delegate: "GPU"
                },
                outputFaceBlendshapes: false,
                runningMode: "IMAGE",
                numFaces: 1
            });

            loadingScreen.style.display = 'none';
            mainUi.style.display = 'block';
        } catch (error) {
            console.error(error);
            loadingText.innerHTML = `<span style="color:var(--error)">Ошибка сети. Проверьте интернет или обновите страницу.</span>`;
        }
    }

    window.addEventListener('load', initMediaPipe);

    // Обработка загруженного фото
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const img = new Image();
        img.onload = function() {
            // Настройка размеров холста
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            ctx.drawImage(img, 0, 0);
            placeholderText.style.display = 'none';
            
            statusMsg.innerText = "Сканирование структуры геометрии...";
            
            setTimeout(() => {
                analyzeFace(img);
            }, 100);
        };
        img.src = URL.createObjectURL(file);
    });

    // Функция анализа геометрии лица
    function analyzeFace(imageElement) {
        if (!faceLandmarker) return;

        const result = faceLandmarker.detect(imageElement);
        
        if (!result || result.faceLandmarks.length === 0) {
            statusMsg.innerHTML = `<span style="color:var(--error)">Лицо не распознано. Снимите очки и обеспечьте свет.</span>`;
            return;
        }

        statusMsg.innerText = "Анализ завершен успешно.";
        const landmarks = result.faceLandmarks[0];

        // Ключевые точки индексов MediaPipe для вычислений
        const leftInnerEye = landmarks[133];
        const leftOuterEye = landmarks[33];
        const rightInnerEye = landmarks[362];
        const rightOuterEye = landmarks[263];

        const chinnasionTop = landmarks[10]; // Верх лба
        const chinMentonBottom = landmarks[152]; // Низ подбородка
        const leftZygomatic = landmarks[234]; // Левая скула
        const rightZygomatic = landmarks[454]; // Правая скула

        const subnasale = landmarks[2]; // Под носом

        // 1. Расчет Canthal Tilt (Левый глаз)
        const dX = leftOuterEye.x - leftInnerEye.x;
        const dY = leftOuterEye.y - leftInnerEye.y;
        let canthalTilt = (Math.atan2(-dY, dX) * (180 / Math.PI)).toFixed(1);
        canthalTilt = parseFloat(canthalTilt);

        // 2. Расчет Facial Index (Высота лица к ширине скул)
        const faceHeight = Math.hypot(chinMentonBottom.x - chinnasionTop.x, chinMentonBottom.y - chinnasionTop.y);
        const faceWidth = Math.hypot(rightZygomatic.x - leftZygomatic.x, rightZygomatic.y - leftZygomatic.y);
        const facialIndex = parseFloat((faceHeight / faceWidth).toFixed(2));

        // 3. Расчет Lower Third Ratio
        const totalHeight = Math.hypot(chinMentonBottom.x - chinnasionTop.x, chinMentonBottom.y - chinnasionTop.y);
        const lowerThirdHeight = Math.hypot(chinMentonBottom.x - subnasale.x, chinMentonBottom.y - subnasale.y);
        const lowerThirdRatio = parseFloat((lowerThirdHeight / totalHeight).toFixed(2));

        // Отрисовка направляющих линий на Canvas
        ctx.lineWidth = Math.max(2, canvas.width / 200);
        
        // Линия глаз (Кантал тилт)
        ctx.strokeStyle = canthalTilt >= 0 ? '#10b981' : '#ef4444';
        ctx.beginPath();
        ctx.moveTo(leftInnerEye.x * canvas.width, leftInnerEye.y * canvas.height);
        ctx.lineTo(leftOuterEye.x * canvas.width, leftOuterEye.y * canvas.height);
        ctx.stroke();

        // Вертикаль лица
        ctx.strokeStyle = '#00f0ff';
        ctx.beginPath();
        ctx.moveTo(chinnasionTop.x * canvas.width, chinnasionTop.y * canvas.height);
        ctx.lineTo(chinMentonBottom.x * canvas.width, chinMentonBottom.y * canvas.height);
        ctx.stroke();

        displayResults(canthalTilt, facialIndex, lowerThirdRatio);
    }

    // Вывод результатов на дашборд
    function displayResults(canthal, fIndex, lowerThird) {
        document.getElementById('dashboard').style.display = 'block';
        
        let pslScore = 5.0; // Базовый средний ранг
        let notes = [];
        let roadmap = [];

        let metricsHtml = '';

        // Оценка Canthal Tilt
        let canthalClass = 'bad';
        if (canthal > 2) {
            canthalClass = 'good';
            pslScore += 0.8;
            notes.push("Положительный кантал тилт (модельный признак, Hunter Eyes).");
        } else if (canthal >= 0) {
            canthalClass = '';
            notes.push("Нейтральный наклон глазной щели.");
        } else {
            pslScore -= 0.8;
            notes.push("Отрицательный кантал тилт (усталый взгляд).");
            roadmap.push("Для визуального исправления век подходят патчи, кремы с кофеином и качественный сон.");
        }
        metricsHtml += `
            <div class="metric-item ${canthalClass}">
                <div class="metric-head"><span>Canthal Tilt (Наклон глаз)</span><span>${canthal}°</span></div>
                <div class="metric-desc">${canthal > 0 ? 'Положительный' : 'Отрицательный/Нейтральный'} угол фиксации.</div>
            </div>`;

        // Оценка формы лица (Facial Index)
        let indexClass = '';
        if (fIndex >= 0.85 && fIndex <= 0.9) {
            indexClass = 'good';
            pslScore += 0.6;
            notes.push("Идеальные пропорции соотношения высоты и ширины лица.");
        } else {
            notes.push("Незначительное отклонение от классического золотого сечения.");
        }
        metricsHtml += `
            <div class="metric-item ${indexClass}">
                <div class="metric-head"><span>Facial Index (Индекс гармонии)</span><span>${fIndex}</span></div>
                <div class="metric-desc">Соотношение ширины скул к высоте черепной коробки. Идеал: 0.85-0.9.</div>
            </div>`;

        // Оценка нижней трети (Lower Third)
        let ltClass = '';
        if (lowerThird < 0.33) {
            ltClass = 'bad';
            pslScore -= 0.5;
            notes.push("Слабовыраженная или укороченная нижняя треть лица.");
            roadmap.push("Для укрепления контуров челюсти и тонизирования зон рекомендуется практиковать правильную осанку и положение языка на нёбе (Мьюинг / Mewing). Избегайте сна на одном боку во избежание мышечных спазмов.");
        } else {
            ltClass = 'good';
            notes.push("Развитая, пропорциональная нижняя челюсть.");
        }
        metricsHtml += `
            <div class="metric-item ${ltClass}">
                <div class="metric-head"><span>Lower Third Ratio (Нижняя треть)</span><span>${lowerThird}</span></div>
                <div class="metric-desc">Доля челюстной зоны в вертикали лица. Норма: ~0.33.</div>
            </div>`;

        // Коррекция и вывод итогового PSL
        pslScore = Math.max(1, Math.min(10, pslScore)).toFixed(1);
        document.getElementById('res-psl').innerText = pslScore;
        
        let tierText = "High Tier MTN";
        if (pslScore >= 6.0) tierText = "Chadlite";
        if (pslScore >= 7.5) tierText = "Chad";
        if (pslScore < 4.0) tierText = "Low Tier MTN";
        document.getElementById('res-tier').innerText = tierText;

        document.getElementById('metrics-list').innerHTML = metricsHtml;

        if(roadmap.length === 0) {
            roadmap.push("Глобальных диспропорций не выявлено. Поддерживайте мышечный тонус лица и качественный уход за кожей.");
        }
        document.getElementById('res-roadmap').innerText = roadmap.join(' ');
    }
</script>
</body>
</html>
